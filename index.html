<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer & Copier</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 900px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
        .controls { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; }
        select, button { padding: 8px 15px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #capture-area { position: relative; margin-top: 20px; padding: 20px; background: #2d2d2d; border-radius: 8px; overflow: hidden; }
        pre { margin: 0 !important; border-radius: 0 !important; }
        .copy-hint { margin-top: 10px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 코드 하이라이터 (Copy & Image)</h2>
    
    <textarea id="code-input" placeholder="여기에 코드를 입력하세요..."></textarea>
    
    <div class="controls">
        <select id="lang-select">
            <option value="python">Python</option>
            <option value="javascript">JavaScript / Apps Script (Code.gs)</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
        </select>
        <button onclick="highlight()">하이라이트 적용</button>
        <button onclick="copyToClipboard()" style="background-color: #28a745;">색상 그대로 복사</button>
        <button onclick="saveImage()" style="background-color: #ffc107; color: black;">이미지로 저장</button>
    </div>

    <div id="capture-area">
        <pre><code id="display" class="language-python"># 코드가 여기에 표시됩니다.</code></pre>
    </div>
    
    <p class="copy-hint">💡 <b>색상 복사:</b> '색상 그대로 복사' 버튼을 누르면 워드, 이메일, 노션 등에 색상과 함께 붙여넣기 됩니다.</p>
</div>

<script>
    // 1. 하이라이팅 적용
    function highlight() {
        const code = document.getElementById('code-input').value;
        const lang = document.getElementById('lang-select').value;
        const display = document.getElementById('display');
        
        display.className = `language-${lang}`;
        display.textContent = code;
        Prism.highlightElement(display);
    }

    // 2. 리치 텍스트 복사 (색상 포함)
    async function copyToClipboard() {
        const area = document.getElementById('capture-area');
        
        // HTML을 클립보드에 Rich Text로 복사하기 위해 임시 범위 설정
        const range = document.createRange();
        range.selectNode(area);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);

        try {
            document.execCommand('copy');
            alert('색상 정보와 함께 복사되었습니다! (워드/노션 등에 붙여넣기 가능)');
        } catch (err) {
            alert('복사 실패: ' + err);
        }
        window.getSelection().removeAllRanges();
    }

    // 3. 이미지로 저장
    function saveImage() {
        const area = document.getElementById('capture-area');
        html2canvas(area).then(canvas => {
            const link = document.createElement('a');
            link.download = 'code-snippet.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
