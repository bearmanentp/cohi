<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크랩 복사 지원 에디터</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 30px; }
        .toolbar { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; background: #2d2d2d; padding: 10px 20px; border-radius: 10px; }
        
        /* 에디터 스타일 */
        #editor-wrapper {
            width: 850px;
            background: #272822;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #3e3e3e;
            position: relative;
        }

        #code-editor {
            width: 100%;
            height: 500px;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            line-height: 1.5;
            tab-size: 4;
            color: #f8f8f2;
            outline: none;
            overflow: auto;
            white-space: pre;
            word-wrap: normal;
        }

        /* Prism 공통 스타일 강제 적용 (복사 시 중요) */
        .token.keyword { color: #f92672 !important; }
        .token.function { color: #a6e22e !important; }
        .token.string { color: #e6db74 !important; }
        .token.comment { color: #75715e !important; }
        .token.operator { color: #f8f8f2 !important; }
        .token.class-name { color: #66d9ef !important; }

        button, select { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-img { background: #f92672; color: white; }
        .tip { color: #aaa; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="lang-select" onchange="highlight()">
        <option value="python">Python</option>
        <option value="javascript">JavaScript / Code.gs</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
    </select>
    <button class="btn-img" onclick="saveImage()">🖼 이미지로 저장</button>
</div>

<div id="editor-wrapper">
    <pre id="editor-pre"><code id="code-editor" contenteditable="true" spellcheck="false"></code></pre>
</div>

<p class="tip">💡 <b>스크랩 가능:</b> 마우스로 코드를 긁어서 복사(Ctrl+C)하면 색상이 유지된 채로 붙여넣기 됩니다.</p>

<script>
    const editor = document.getElementById('code-editor');

    // 1. 하이라이팅 함수
    function highlight() {
        const lang = document.getElementById('lang-select').value;
        const selection = window.getSelection();
        const range = selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
        
        // 현재 커서 위치 저장
        const offset = getCaretCharacterOffsetWithin(editor);

        let code = editor.innerText;
        editor.className = `language-${lang}`;
        editor.textContent = code;
        Prism.highlightElement(editor);

        // 커서 위치 복구
        if (range) {
            setCaretPosition(editor, offset);
        }
    }

    // 2. 실시간 입력 감지
    editor.addEventListener('input', () => {
        highlight();
    });

    // 3. IDE 기능 (탭, 자동 완성)
    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            insertTextAtCaret("    ");
        } else if (['(', '[', '{', "'", '"'].includes(e.key)) {
            e.preventDefault();
            const pairs = {'(':')', '[':']', '{':'}', "'":"'", '"':'"'};
            insertTextAtCaret(e.key + pairs[e.key]);
            // 커서를 괄호 사이로 이동
            const offset = getCaretCharacterOffsetWithin(editor);
            setCaretPosition(editor, offset - 1);
        }
    });

    // --- 유틸리티 함수들 (커서 제어) ---
    function insertTextAtCaret(text) {
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(text));
        highlight();
    }

    function getCaretCharacterOffsetWithin(element) {
        let caretOffset = 0;
        const sel = window.getSelection();
        if (sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(element);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            caretOffset = preCaretRange.toString().length;
        }
        return caretOffset;
    }

    function setCaretPosition(element, offset) {
        const range = document.createRange();
        const sel = window.getSelection();
        let currentOffset = 0;
        let nodeStack = [element];
        let node, found = false;

        while (!found && (node = nodeStack.pop())) {
            if (node.nodeType === 3) {
                const nextOffset = currentOffset + node.length;
                if (offset <= nextOffset) {
                    range.setStart(node, offset - currentOffset);
                    range.setEnd(node, offset - currentOffset);
                    found = true;
                }
                currentOffset = nextOffset;
            } else {
                for (let i = node.childNodes.length - 1; i >= 0; i--) {
                    nodeStack.push(node.childNodes[i]);
                }
            }
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function saveImage() {
        html2canvas(document.getElementById('editor-wrapper'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'code-snap.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // 초기 예시
    editor.innerText = "def python_style():\n    print('마우스로 드래그해서 복사해보세요!')";
    highlight();
</script>

</body>
</html>
