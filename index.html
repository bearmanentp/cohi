<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진정한 일체형 코드 에디터</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 30px; margin: 0; }
        .toolbar { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; background: white; padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* 에디터 메인 컨테이너 */
        #editor-container {
            position: relative;
            width: 850px;
            height: 500px;
            background: #272822; /* Okaidia 배경색 */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 입력 및 결과 레이어 공통 스타일 */
        #editing, #highlighting {
            margin: 0;
            padding: 20px;
            width: 100%;
            height: 100%;
            border: none;
            box-sizing: border-box;
            font-family: 'Consolas', 'Monaco', 'Andale Mono', monospace; /* 고정폭 글꼴 */
            font-size: 16px;
            line-height: 1.5;
            tab-size: 4;
            white-space: pre;
            word-wrap: normal;
            overflow: auto;
            position: absolute;
            top: 0; left: 0;
        }

        /* 1. 실제 타이핑하는 입력창 (투명) */
        #editing {
            z-index: 1;
            background: transparent;
            color: transparent; /* 글자는 투명하게 */
            caret-color: #f8f8f2; /* 커서 색상 */
            resize: none;
            outline: none;
            overflow-y: scroll; /* 스크롤바 항상 표시로 동기화 */
        }

        /* 2. 하이라이팅된 색상이 보이는 결과창 */
        #highlighting {
            z-index: 0;
            pointer-events: none; /* 클릭 불가 */
            overflow: hidden; /* 스크롤바 숨김 (입력창과 연동) */
        }
        
        code { font-family: inherit !important; }

        /* 컨트롤 요소 */
        button, select { padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; font-size: 0.9em; }
        .btn-copy { background: #e6db74; color: black; border: none; }
        .btn-img { background: #f92672; color: white; border: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="lang-select" onchange="update()">
        <option value="python">Python</option>
        <option value="javascript">JavaScript / Code.gs</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
    </select>
    <button class="btn-copy" onclick="copyRichText()">🎨 색상 그대로 복사</button>
    <button class="btn-img" onclick="saveImage()">🖼 이미지 저장</button>
</div>

<div id="editor-container">
    <textarea id="editing" spellcheck="false" 
        oninput="update(); syncScroll();" 
        onscroll="syncScroll()" 
        onkeydown="handleIDEFeatures(event)"></textarea>
    
    <pre id="highlighting" aria-hidden="true"><code id="highlighting-content"></code></pre>
</div>

<script>
    const elEditing = document.querySelector("#editing");
    const elHighlighting = document.querySelector("#highlighting-content");
    const elPre = document.querySelector("#highlighting");

    // 1. 실시간 하이라이팅 업데이트
    function update() {
        let text = elEditing.value;
        const lang = document.getElementById('lang-select').value;

        // 끝부분 줄바꿈 처리
        if (text[text.length - 1] === "\n") text += " ";
        
        elHighlighting.className = `language-${lang}`;
        elHighlighting.textContent = text;
        Prism.highlightElement(elHighlighting);
    }

    // 2. 스크롤 동기화
    function syncScroll() {
        elPre.scrollTop = elEditing.scrollTop;
        elPre.scrollLeft = elEditing.scrollLeft;
    }

    // 3. 색상 포함 복사
    function copyRichText() {
        const range = document.createRange();
        range.selectNode(elPre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            alert("선명한 색상 서식이 클립보드에 복사되었습니다!\n(워드, 노션, 이메일 등에 붙여넣기)");
        } catch (err) {
            alert("복사 실패!");
        }
        window.getSelection().removeAllRanges();
    }

    // 4. 이미지 저장
    function saveImage() {
        html2canvas(document.querySelector("#editor-container"), {
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'code-clear-capture.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // 5. IDE 기능 (탭, 괄호/따옴표 자동 완성)
    function handleIDEFeatures(e) {
        const input = elEditing;
        const start = input.selectionStart;
        const end = input.selectionEnd;

        // 탭 키 (들여쓰기)
        if (e.key === 'Tab') {
            e.preventDefault();
            input.value = input.value.substring(0, start) + "\t" + input.value.substring(end);
            input.selectionStart = input.selectionEnd = start + 1;
            update();
        }

        // 괄호 및 따옴표 자동 완성
        const pairs = {
            "'": "'",
            '"': '"',
            '(': ')',
            '[': ']',
            '{': '}'
        };

        if (pairs[e.key]) {
            e.preventDefault(); // 기본 입력 막음
            const open = e.key;
            const close = pairs[open];
            
            // 괄호 사이에 입력값 넣기
            input.value = input.value.substring(0, start) + open + close + input.value.substring(end);
            
            // 커서를 열린 괄호와 닫힌 괄호 사이에 위치
            input.selectionStart = input.selectionEnd = start + 1;
            update();
        }
    }

    // 초기 예시 코드
    elEditing.value = "def hello():\n\tprint('Hello World!')\n\nhello()";
    update();
</script>

</body>
</html>
