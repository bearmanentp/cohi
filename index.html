<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일체형 코드 에디터</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e1e1e; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        
        /* 에디터 컨테이너: 입력창과 프리뷰를 겹침 */
        #editor-container {
            position: relative;
            width: 800px;
            height: 450px;
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #editing, #highlighting {
            margin: 0;
            padding: 20px;
            width: 100%;
            height: 100%;
            border: none;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 16px;
            line-height: 1.5;
            tab-size: 4;
            white-space: pre;
            word-wrap: normal;
            overflow: auto;
            position: absolute;
            top: 0; left: 0;
        }

        /* 실제 타이핑이 일어나는 투명 textarea */
        #editing {
            z-index: 1;
            background: transparent;
            color: transparent;
            caret-color: white; /* 커서만 보이게 설정 */
            resize: none;
            outline: none;
        }

        /* 색상이 입혀지는 레이어 */
        #highlighting { z-index: 0; pointer-events: none; }
        code { font-family: inherit !important; }

        button, select { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-copy { background: #22c55e; color: white; }
        .btn-img { background: #eab308; color: black; }
    </style>
</head>
<body>

<div class="controls">
    <select id="lang-select" onchange="update()">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
    </select>
    <button class="btn-copy" onclick="copyRichText()">🎨 색상 그대로 복사</button>
    <button class="btn-img" onclick="saveImage()">🖼 이미지 저장</button>
</div>

<div id="editor-container">
    <textarea id="editing" spellcheck="false" oninput="update(); syncScroll();" onscroll="syncScroll()"></textarea>
    <pre id="highlighting" aria-hidden="true"><code id="highlighting-content"></code></pre>
</div>

<script>
    const elEditing = document.querySelector("#editing");
    const elHighlighting = document.querySelector("#highlighting-content");
    const elPre = document.querySelector("#highlighting");

    function update() {
        let text = elEditing.value;
        const lang = document.getElementById('lang-select').value;

        // HTML 태그 처리 (< 를 &lt; 로 변환)
        if (text[text.length - 1] === "\n") text += " ";
        
        elHighlighting.className = `language-${lang}`;
        elHighlighting.textContent = text;
        Prism.highlightElement(elHighlighting);
    }

    // 입력창과 하이라이트 레이어 스크롤 동기화
    function syncScroll() {
        elPre.scrollTop = elEditing.scrollTop;
        elPre.scrollLeft = elEditing.scrollLeft;
    }

    // 색상 포함 복사 (전체 에디터 영역 캡쳐 복사)
    function copyRichText() {
        const range = document.createRange();
        range.selectNode(elPre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        alert("색상 서식이 클립보드에 복사되었습니다!");
    }

    // 이미지 저장
    function saveImage() {
        html2canvas(document.querySelector("#editor-container"), {
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'code-capture.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // 탭 키 입력 처리 (에디터 편의성)
    elEditing.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 1;
            update();
        }
    });

    // 초기 예시 코드
    elEditing.value = "print('Hello World!')\n# 여기에 코드를 바로 입력하세요.";
    update();
</script>

</body>
</html>
