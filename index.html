<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로페셔널 코드 툴</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --bg: #1e1e1e; --editor-bg: #272822; --text: #f8f8f2; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .menu { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        select, button { padding: 10px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        
        select { background: #333; color: white; }
        .btn-text { background: #66d9ef; color: #000; }  /* 일반 텍스트 */
        .btn-color { background: #a6e22e; color: #000; } /* 컬러 텍스트 */
        .btn-img-copy { background: #fd971f; color: #000; } /* 이미지 복사 */
        .btn-img-save { background: #f92672; color: #fff; } /* 이미지 저장 */
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 에디터 컨테이너: 이 영역 전체가 배경색과 함께 스크랩됨 */
        #capture-area {
            background-color: var(--editor-bg);
            padding: 20px;
            border-radius: 12px;
            width: 850px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        #editor-container { position: relative; width: 100%; height: 500px; }

        #editing, #highlighting {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px; line-height: 1.5;
            tab-size: 4; white-space: pre; 
            position: absolute; top: 0; left: 0;
            border: none; outline: none; background: transparent;
        }

        /* 입력창: 실제 편집 수행 */
        #editing {
            z-index: 1; color: transparent; caret-color: white;
            resize: none; overflow: auto;
        }

        /* 출력창: 색상 표시 및 스크랩 대상 */
        #highlighting { z-index: 0; pointer-events: none; color: var(--text); overflow: hidden; }
        code { font-family: inherit !important; }

        /* 복사 시 배경색 유지를 위한 강제 스타일 */
        #highlighting pre { background: transparent !important; margin: 0; }
    </style>
</head>
<body>

<div class="menu">
    <select id="lang-select" onchange="update()">
        <option value="python">Python</option>
        <option value="javascript">JavaScript / Code.gs</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
    </select>
    <button class="btn-text" onclick="copyPureText()">텍스트 복사</button>
    <button class="btn-color" onclick="copyColorText()">컬러+배경 복사</button>
    <button class="btn-img-copy" onclick="copyImage()">이미지 복사</button>
    <button class="btn-img-save" onclick="saveImage()">이미지 저장</button>
</div>

<div id="capture-area">
    <div id="editor-container">
        <textarea id="editing" spellcheck="false" oninput="update(); syncScroll();" onscroll="syncScroll()" onkeydown="handleIDE(event)"></textarea>
        <div id="highlighting">
            <pre><code id="hl-content"></code></pre>
        </div>
    </div>
</div>

<script>
    const elInput = document.getElementById('editing');
    const elOutput = document.getElementById('hl-content');
    const elBox = document.getElementById('highlighting');

    function update() {
        let code = elInput.value;
        const lang = document.getElementById('lang-select').value;
        if (code[code.length - 1] === "\n") code += " ";
        elOutput.className = `language-${lang}`;
        elOutput.textContent = code;
        Prism.highlightElement(elOutput);
    }

    function syncScroll() {
        elBox.scrollTop = elInput.scrollTop;
        elBox.scrollLeft = elInput.scrollLeft;
    }

    // 1. 순수 텍스트만 복사
    function copyPureText() {
        navigator.clipboard.writeText(elInput.value);
        alert("순수 텍스트가 복사되었습니다.");
    }

    // 2. 컬러 텍스트 + 배경색 복사 (스크랩 효과)
    function copyColorText() {
        const area = document.getElementById('capture-area');
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNode(area);
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand('copy');
        selection.removeAllRanges();
        alert("컬러와 배경색이 포함된 스크랩이 복사되었습니다.");
    }

    // 3. 이미지로 클립보드 복사
    async function copyImage() {
        const area = document.getElementById('capture-area');
        const canvas = await html2canvas(area, {scale: 2});
        canvas.toBlob(blob => {
            const item = new ClipboardItem({ "image/png": blob });
            navigator.clipboard.write([item]);
            alert("이미지가 클립보드에 복사되었습니다.");
        });
    }

    // 4. 이미지 파일 저장
    async function saveImage() {
        const area = document.getElementById('capture-area');
        const canvas = await html2canvas(area, {scale: 2});
        const link = document.createElement('a');
        link.download = 'code-design.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // IDE 편의기능 (탭, 자동 괄호)
    function handleIDE(e) {
        const start = elInput.selectionStart;
        const end = elInput.selectionEnd;
        const pairs = {'(':')','[':']','{':'}',"'":"'",'"':'"'};

        if (e.key === 'Tab') {
            e.preventDefault();
            elInput.value = elInput.value.substring(0, start) + "    " + elInput.value.substring(end);
            elInput.selectionStart = elInput.selectionEnd = start + 4;
        } else if (pairs[e.key]) {
            e.preventDefault();
            elInput.value = elInput.value.substring(0, start) + e.key + pairs[e.key] + elInput.value.substring(end);
            elInput.selectionStart = elInput.selectionEnd = start + 1;
        }
        update();
    }

    // 초기값
    elInput.value = "def hello_world():\n    # 이 영역을 복사하면 배경까지 복사됩니다.\n    print(\"Hello, Python!\")\n\nhello_world()";
    update();
</script>

</body>
</html>
